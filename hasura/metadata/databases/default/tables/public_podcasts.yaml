table:
  name: podcasts
  schema: public
object_relationships:
  - name: user
    using:
      foreign_key_constraint_on: user_id
insert_permissions:
  - role: anonymous
    permission:
      check: {}
      columns:
        - podcast_name
        - title
        - url
        - date
        - description
        - transcription_md
        - created_at
        - id
        - user_id
    comment: ""
  - role: user
    permission:
      check:
        user_id:
          _eq: X-Hasura-User-Id
      set:
        user_id: x-hasura-User-Id
      columns:
        - podcast_name
        - title
        - url
        - date
        - description
        - transcription_md
        - created_at
        - id
        - user_id
    comment: ""
select_permissions:
  - role: anonymous
    permission:
      columns:
        - podcast_name
        - title
        - url
        - date
        - description
        - transcription_md
        - created_at
        - id
        - user_id
      filter: {}
    comment: ""
  - role: user
    permission:
      columns:
        - podcast_name
        - title
        - url
        - date
        - description
        - transcription_md
        - created_at
        - id
        - user_id
      filter: {}
    comment: ""
update_permissions:
  - role: user
    permission:
      columns:
        - date
        - description
        - podcast_name
        - title
        - transcription_md
        - url
      filter:
        user_id:
          _eq: X-Hasura-User-Id
      check: null
    comment: ""
delete_permissions:
  - role: user
    permission:
      filter:
        user_id:
          _eq: X-Hasura-User-Id
    comment: ""
